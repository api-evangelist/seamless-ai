apis:
  - aid: seamless-ai:seamless-ai-contacts-api
    name: Seamless.AI Contacts API
    tags:
      - Contacts
      - Sales Intelligence
      - B2B
      - Prospecting
    humanURL: https://docs.seamless.ai/
    baseURL: https://api.seamless.ai
    properties:
      - url: openapi/seamless-ai-contacts-openapi.yml
        type: OpenAPI
      - url: https://docs.seamless.ai/
        type: Documentation
    description: >-
      The Seamless.AI Contacts API provides programmatic access to contact search,
      enrichment, and research capabilities. Search for B2B contacts by name, company,
      title, and location. Enrich existing contact records with emails, phone numbers,
      and job history. Access job-change intelligence to identify contacts that have
      recently changed roles.

  - aid: seamless-ai:seamless-ai-companies-api
    name: Seamless.AI Companies API
    tags:
      - Companies
      - Firmographics
      - Sales Intelligence
      - B2B
    humanURL: https://docs.seamless.ai/
    baseURL: https://api.seamless.ai
    properties:
      - url: openapi/seamless-ai-companies-openapi.yml
        type: OpenAPI
      - url: https://docs.seamless.ai/
        type: Documentation
    description: >-
      The Seamless.AI Companies API enables programmatic search and research of company
      data including firmographics, revenue, employee count, technology stack, and
      company intelligence. Use company search result IDs or direct identifiers such
      as domain or company name to retrieve comprehensive company profiles.

