naftiko: 1.0.0-alpha2
info:
  label: Seamless.AI Contacts API — Contacts
  description: 'Seamless.AI Contacts API — Contacts. 4 operations. Lead operation: Enrich Contact. Self-contained Naftiko
    capability covering one Seamless Ai business surface.'
  tags:
  - Seamless Ai
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEAMLESS_AI_API_KEY: SEAMLESS_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: contacts-contacts
    baseUri: https://api.seamless.ai
    description: Seamless.AI Contacts API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: v1-contacts-enrich
      path: /v1/contacts/enrich
      operations:
      - name: enrichcontact
        method: POST
        description: Enrich Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-contacts-job-changes
      path: /v1/contacts/job-changes
      operations:
      - name: listcontactjobchanges
        method: GET
        description: List Contact Job Changes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for paginated results
        - name: per_page
          in: query
          type: integer
          description: Number of results per page (max 100)
        - name: days
          in: query
          type: integer
          description: Number of days to look back for job changes
    - name: v1-contacts-research
      path: /v1/contacts/research
      operations:
      - name: researchcontact
        method: POST
        description: Research Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-contacts-search
      path: /v1/contacts/search
      operations:
      - name: searchcontacts
        method: POST
        description: Search Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.SEAMLESS_AI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: contacts-contacts-rest
    port: 8080
    description: REST adapter for Seamless.AI Contacts API — Contacts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/contacts/enrich
      name: v1-contacts-enrich
      description: REST surface for v1-contacts-enrich.
      operations:
      - method: POST
        name: enrichcontact
        description: Enrich Contact
        call: contacts-contacts.enrichcontact
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/contacts/job-changes
      name: v1-contacts-job-changes
      description: REST surface for v1-contacts-job-changes.
      operations:
      - method: GET
        name: listcontactjobchanges
        description: List Contact Job Changes
        call: contacts-contacts.listcontactjobchanges
        with:
          page: rest.page
          per_page: rest.per_page
          days: rest.days
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/contacts/research
      name: v1-contacts-research
      description: REST surface for v1-contacts-research.
      operations:
      - method: POST
        name: researchcontact
        description: Research Contact
        call: contacts-contacts.researchcontact
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/contacts/search
      name: v1-contacts-search
      description: REST surface for v1-contacts-search.
      operations:
      - method: POST
        name: searchcontacts
        description: Search Contacts
        call: contacts-contacts.searchcontacts
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: contacts-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Seamless.AI Contacts API — Contacts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: enrich-contact
      description: Enrich Contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: contacts-contacts.enrichcontact
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-contact-job-changes
      description: List Contact Job Changes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: contacts-contacts.listcontactjobchanges
      with:
        page: tools.page
        per_page: tools.per_page
        days: tools.days
      outputParameters:
      - type: object
        mapping: $.
    - name: research-contact
      description: Research Contact
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: contacts-contacts.researchcontact
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-contacts
      description: Search Contacts
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: contacts-contacts.searchcontacts
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
